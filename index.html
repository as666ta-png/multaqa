<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        /* تم إزالة user-select: none */
    }

    /* السماح بتحديد النص داخل الحقول فقط */
    input, textarea {
        -webkit-user-select: text;
        user-select: text;
    }

    :root {
        --amber: #f59e0b;
        --cyan: #06b6d4;
        --bg: #0a1628;
        --card: rgba(15, 30, 60, 0.85);
        --text: #e2e8f0;
        --muted: #94a3b8;
    }

    body {
        font-family: -apple-system, 'Segoe UI', sans-serif;
        background: linear-gradient(160deg, #0a1628 0%, #0f2a45 30%, #0a3d5c 60%, #0a1628 100%);
        color: var(--text);
        min-height: 100vh;
        min-height: 100dvh;
        direction: rtl;
        /* ضمان عدم منع التفاعل */
        touch-action: manipulation;
    }

    .screen {
        display: none;
        min-height: 100vh;
        min-height: 100dvh;
        animation: fadeIn 0.3s ease;
        flex-direction: column;
        /* تأكيد أن الشاشة النشطة فقط هي المرئية */
    }

    .screen.active {
        display: flex;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .header {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        background: rgba(10, 22, 40, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 10px;
    }

    .header h2 {
        flex: 1;
        text-align: center;
        font-size: 17px;
        font-weight: 700;
    }

    .header-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.05);
        color: white;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        /* ضمان استقبال النقر */
        pointer-events: auto;
        touch-action: manipulation;
    }

    .header-btn:active {
        background: rgba(245, 158, 11, 0.25);
        border-color: var(--amber);
        transform: scale(0.93);
    }

    .main-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
    }

    .tree-logo {
        font-size: 70px;
        margin-bottom: 10px;
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    .app-name {
        font-size: 38px;
        font-weight: 900;
        background: linear-gradient(135deg, #06b6d4, #3b82f6, #f59e0b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 5px;
    }

    .app-tagline {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 40px;
        letter-spacing: 2px;
    }

    .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        max-width: 400px;
    }

    .menu-btn {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 22px 15px;
        cursor: pointer;
        text-align: center;
        backdrop-filter: blur(10px);
        pointer-events: auto;
        touch-action: manipulation;
    }

    .menu-btn:active {
        transform: scale(0.95);
        border-color: rgba(245, 158, 11, 0.5);
        background: rgba(245, 158, 11, 0.08);
    }

    .menu-btn .icon {
        font-size: 36px;
        display: block;
        margin-bottom: 8px;
    }

.menu-btn .label {
        font-size: 14px;
        font-weight: 700;
        color: var(--amber);
        display: block;
        margin-bottom: 3px;
    }

    .menu-btn .desc {
        font-size: 10px;
        color: var(--muted);
    }

    .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        -webkit-overflow-scrolling: touch;
    }

    .welcome-msg {
        text-align: center;
        padding: 50px 20px;
    }

    .welcome-msg .welcome-icon {
        font-size: 55px;
        margin-bottom: 15px;
    }

    .welcome-msg h3 {
        font-size: 20px;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #06b6d4, #f59e0b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .welcome-msg p {
        font-size: 13px;
        color: var(--muted);
    }

    .msg {
        margin-bottom: 14px;
        animation: fadeIn 0.3s ease;
    }

    .msg.user {
        display: flex;
        justify-content: flex-end;
    }

    .msg .bubble {
        display: inline-block;
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.6;
        word-break: break-word;
    }

    .msg.user .bubble {
        background: linear-gradient(135deg, #f59e0b, #eab308);
        color: #0a1628;
        border-bottom-right-radius: 5px;
    }

    .msg.assistant .bubble {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        border-bottom-left-radius: 5px;
    }

    .msg .time {
        font-size: 10px;
        opacity: 0.45;
        margin-top: 4px;
        display: block;
    }

    .msg.user .time { text-align: left; }
    .msg.assistant .time { text-align: right; }

    .chat-bar {
        display: flex;
        gap: 8px;
        padding: 10px 15px;
        padding-bottom: 25px;
        background: rgba(10, 22, 40, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255,255,255,0.08);
        position: sticky;
        bottom: 0;
    }

    .chat-bar input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 25px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.06);
        color: white;
        font-size: 16px;
        font-family: inherit;
        outline: none;
    }

    .chat-bar input:focus {
        border-color: var(--amber);
    }

    .chat-bar .send {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #f59e0b, #eab308);
        color: #0a1628;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        pointer-events: auto;
        touch-action: manipulation;
    }

    .chat-bar .send:active {
        transform: scale(0.9);
    }

    .list-area {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 14px;
    }

    .card {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 15px;
        margin-bottom: 10px;
        cursor: pointer;
        pointer-events: auto;
        touch-action: manipulation;
    }

    .card:active {
        transform: scale(0.97);
        border-color: rgba(245, 158, 11, 0.4);
    }

    .card .card-title {
        font-weight: 700;
        color: var(--amber);
        font-size: 15px;
        margin-bottom: 4px;
    }

    .card .card-subtitle {
        font-size: 12px;
        color: var(--muted);
    }

    .card .card-date {
        font-size: 10px;
        opacity: 0.4;
        margin-top: 6px;
    }

    .content-area {
        flex: 1;
        padding: 20px 15px;
    }

.big-input {
        width: 100%;
        padding: 14px 18px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.06);
        color: white;
        font-size: 16px;
        font-family: inherit;
        outline: none;
        margin-bottom: 12px;
    }

    .big-input:focus {
        border-color: var(--amber);
    }

    .action-btn {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #06b6d4, #0ea5e9);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        pointer-events: auto;
        touch-action: manipulation;
    }

    .action-btn:active {
        transform: scale(0.96);
    }

    .danger-btn {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        background: rgba(239, 68, 68, 0.08);
        color: #ef4444;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        margin-top: 12px;
        pointer-events: auto;
        touch-action: manipulation;
    }

    .setting-row {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 12px;
    }

    .setting-row label {
        display: block;
        font-weight: 700;
        color: var(--amber);
        margin-bottom: 8px;
        font-size: 14px;
    }

    .setting-row select,
    .setting-row input[type="range"] {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.05);
        color: white;
        font-family: inherit;
        font-size: 14px;
    }

    .loading-dots {
        display: flex;
        gap: 7px;
        justify-content: center;
        padding: 20px;
    }

    .loading-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        animation: bounce 1s infinite;
    }

    .loading-dots span:nth-child(1) { background: #06b6d4; animation-delay: 0s; }
    .loading-dots span:nth-child(2) { background: #3b82f6; animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { background: #f59e0b; animation-delay: 0.3s; }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    .result-card {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 15px;
        margin-top: 10px;
    }

    .result-card a {
        color: var(--amber);
        text-decoration: none;
        font-weight: 600;
        display: block;
        padding: 8px 0;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.15); border-radius: 3px; }
        </style>
